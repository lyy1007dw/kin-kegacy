server:
  port: 8080

spring:
  application:
    name: family-tree
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/family_tree?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${spring.datasource.username}
    password: ${spring.datasource.password}
  profiles:
    active: dev

wechat:
  miniapp:
    appid: ${wechat.miniapp.appid}
    secret: ${wechat.miniapp.secret}

jwt:
  secret: ${jwt.secret}
  expiration: 86400000
  refresh-expiration: 604800000
  header: Authorization
  prefix: "Bearer "

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.kin.family.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  type-enums-package: com.kin.family.constant

logging:
  level:
    com.kin.family: debug

file:
  upload:
    type: oss
    allowed-types: jpg,jpeg,png,gif,webp
    max-size: 5242880
  oss:
    endpoint: ${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    bucket-name: ${OSS_BUCKET_NAME:kin-legacy}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    url-prefix: https://${OSS_BUCKET_NAME:kin-legacy}.${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}/
